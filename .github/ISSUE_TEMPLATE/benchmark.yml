name: Benchmark Results
description: Share your benchmark results to help track performance across hardware
title: "[Benchmark] <chip> — <RAM>GB"
labels: ["benchmark"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for running the benchmark! Paste the content of `RESULTS.md` generated by `./scripts/benchmark.sh`.

  - type: input
    id: chip
    attributes:
      label: Apple Silicon chip
      placeholder: "e.g. M3 Max, M4 Pro, M2 Ultra"
    validations:
      required: true

  - type: input
    id: memory
    attributes:
      label: Unified memory (GB)
      placeholder: "e.g. 36, 64, 96, 128, 192"
    validations:
      required: true

  - type: dropdown
    id: mode
    attributes:
      label: Benchmark mode
      options:
        - quick (9 frames only)
        - full (9 frames + 10 seconds)
    validations:
      required: true

  - type: textarea
    id: results
    attributes:
      label: Results table
      description: Paste the **Results** table from RESULTS.md
      placeholder: |
        | Test | Total | Denoising | VAE Decode | Text Encode | Peak Memory |
        |------|-------|-----------|------------|-------------|-------------|
        | t2v-768x512-9f | 33.0s | 24.8s | 1.6s | 5.5s | 40187 MB |
        | ...  | ...   | ...       | ...        | ...         | ...         |
      render: markdown
    validations:
      required: true

  - type: textarea
    id: full-results
    attributes:
      label: Full RESULTS.md
      description: Paste the entire RESULTS.md file here (optional but helpful)
      render: markdown

  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Any issues, observations, or context (e.g. other apps running, power source, ambient temperature)
